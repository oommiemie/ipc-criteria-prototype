<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>IPC Criteria — New</title>
<script src="https://cdn.tailwindcss.com"></script>
<script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Sarabun:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --brand: #10b981;
    --brand-dark: #047857;
    --brand-soft: #ecfdf5;
  }
  html, body, #root { height: 100%; }
  body {
    font-family: 'Inter', 'Sarabun', system-ui, sans-serif;
    background: #f8fafc;
    color: #0f172a;
  }
  .field-input {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid #e2e8f0;
    border-radius: 10px;
    background: #fff;
    font-size: 14px;
    color: #0f172a;
    transition: all .15s ease;
    outline: none;
  }
  .field-input::placeholder { color: #94a3b8; }
  .field-input:hover { border-color: #cbd5e1; }
  .field-input:focus {
    border-color: var(--brand);
    box-shadow: 0 0 0 3px rgba(16,185,129,.15);
  }
  .field-label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: #334155;
    margin-bottom: 6px;
  }
  .req { color: #ef4444; margin-left: 2px; }
  .helper { font-size: 12px; color: #64748b; margin-top: 6px; }
  .panel {
    background: #fff;
    border: 1px solid #e2e8f0;
    border-radius: 16px;
    box-shadow: 0 1px 2px rgba(15,23,42,.04), 0 8px 24px rgba(15,23,42,.04);
  }
  .sub-panel {
    background: var(--brand-soft);
    border: 1px solid #a7f3d0;
    border-radius: 14px;
  }
  .sidebar-item {
    display: flex; align-items: center; gap: 10px;
    padding: 9px 12px; border-radius: 10px;
    color: #cbd5e1; font-size: 14px; cursor: pointer;
    transition: background .15s, color .15s;
  }
  .sidebar-item:hover { background: rgba(255,255,255,.05); color: #fff; }
  .sidebar-item.active { background: rgba(16,185,129,.15); color: #6ee7b7; }
  .sidebar-sub { padding-left: 36px; font-size: 13px; color: #94a3b8; }
  .sidebar-sub:hover { color: #fff; }
  .toggle {
    position: relative; width: 38px; height: 22px;
    background: #cbd5e1; border-radius: 999px; cursor: pointer;
    transition: background .15s;
  }
  .toggle.on { background: var(--brand); }
  .toggle .knob {
    position: absolute; top: 2px; left: 2px;
    width: 18px; height: 18px; background: #fff; border-radius: 50%;
    transition: transform .15s; box-shadow: 0 1px 3px rgba(0,0,0,.2);
  }
  .toggle.on .knob { transform: translateX(16px); }
  .btn {
    padding: 10px 20px; border-radius: 10px; font-weight: 600;
    font-size: 14px; cursor: pointer; transition: all .15s;
    border: 1px solid transparent;
  }
  .btn-ghost { background: #fff; border-color: #e2e8f0; color: #475569; }
  .btn-ghost:hover { background: #f1f5f9; }
  .btn-primary { background: var(--brand); color: #fff; }
  .btn-primary:hover { background: var(--brand-dark); }
  .chip {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 4px 10px; border-radius: 999px;
    background: #ecfdf5; color: #047857;
    font-size: 12px; font-weight: 500;
  }
  .scrollbar::-webkit-scrollbar { width: 8px; }
  .scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 999px; }
</style>
</head>

    dice: <><rect x="3" y="3" width="18" height="18" rx="3" strokeWidth="2" /><circle cx="8" cy="8" r="1.2" fill="currentColor" /><circle cx="16" cy="8" r="1.2" fill="currentColor" /><circle cx="12" cy="12" r="1.2" fill="currentColor" /><circle cx="8" cy="16" r="1.2" fill="currentColor" /><circle cx="16" cy="16" r="1.2" fill="currentColor" /></>,
    layers: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" />,

function Toggle({ value, onChange, label }) {
  return (
    <label className="inline-flex items-center gap-2 cursor-pointer select-none">
      <span className={`toggle ${value ? 'on' : ''}`} onClick={() => onChange(!value)}>
        <span className="knob" />
      </span>
      <span className="text-sm font-medium text-slate-700">{label}</span>
    </label>
  );
}

function AddOptionModal({ open, title, fields, onCancel, onSubmit, prefill }) {
  const [values, setValues] = useState({});

  React.useEffect(() => {
    if (open) {
      const init = {};
      fields.forEach(f => init[f.key] = (prefill && prefill[f.key]) || '');
      setValues(init);
    }
  }, [open]);

  if (!open) return null;

  const canSubmit = fields.filter(f => f.required !== false).every(f => (values[f.key] || '').trim());

  const submit = () => {
    if (!canSubmit) return;
    onSubmit(values);
  };

  return (
    <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/40 backdrop-blur-sm"
      onClick={onCancel}>
      <div className="bg-white rounded-2xl shadow-2xl w-full max-w-md overflow-hidden"
        onClick={e => e.stopPropagation()}>
        <div className="px-6 py-4 border-b border-slate-100 flex items-center gap-3">
          <div className="w-9 h-9 rounded-lg bg-emerald-50 text-emerald-600 flex items-center justify-center">
            <Icon name="plus" className="w-5 h-5" />
          </div>
          <div>
            <h3 className="font-semibold text-slate-900">{title}</h3>
            <p className="text-xs text-slate-500">กรอกข้อมูลเพื่อเพิ่มตัวเลือกใหม่</p>
          </div>
        </div>

        <div className="p-6 space-y-4">
          {fields.map((f, i) => (
            <div key={f.key}>
              <label className="field-label">
                {f.label}
                {f.required !== false && <span className="req">*</span>}
              </label>
              {f.type === 'textarea' ? (
                <textarea
                  className="field-input min-h-[80px] resize-none"
                  placeholder={f.placeholder}
                  value={values[f.key] || ''}
                  onChange={e => setValues(v => ({ ...v, [f.key]: e.target.value }))} />
              ) : (
                <input
                  className="field-input"
                  placeholder={f.placeholder}
                  value={values[f.key] || ''}
                  autoFocus={i === 0}
                  onChange={e => setValues(v => ({ ...v, [f.key]: e.target.value }))}
                  onKeyDown={e => {
                    if (e.key === 'Enter' && canSubmit) submit();
                    if (e.key === 'Escape') onCancel();
                  }} />
              )}
              {f.helper && <p className="helper">{f.helper}</p>}
            </div>
          ))}
        </div>

        <div className="px-6 py-4 bg-slate-50 border-t border-slate-100 flex justify-end gap-2">
          <button type="button" onClick={onCancel} className="btn btn-ghost">ยกเลิก</button>
          <button type="button" onClick={submit} disabled={!canSubmit}
            className="btn btn-primary disabled:opacity-40 disabled:cursor-not-allowed">
            เพิ่ม
          </button>
        </div>
      </div>
    </div>
  );
}

function EditableSelect({ value, onChange, options, onAdd, placeholder, modalTitle, modalFields }) {
  const [modalOpen, setModalOpen] = useState(false);
  const [prefill, setPrefill] = useState('');

  return (
    <>
      <SearchableSelect
        value={value}
        onChange={onChange}
        options={options}
        placeholder={placeholder}
        onAddNew={(searchText) => {
          setPrefill(searchText || '');
          setModalOpen(true);
        }} />
      <AddOptionModal
        open={modalOpen}
        title={modalTitle}
        fields={modalFields}
        prefill={prefill ? { [modalFields[0].key]: prefill } : null}
        onCancel={() => setModalOpen(false)}
        onSubmit={(vals) => { onAdd(vals); setModalOpen(false); }} />
    </>
  );
}

function SearchableSelect({ value, onChange, options, placeholder, onAddNew, addNewLabel = "＋ เพิ่มตัวเลือกใหม่..." }) {
  const [open, setOpen] = useState(false);
  const [search, setSearch] = useState('');
  const [hoveredIdx, setHoveredIdx] = useState(0);
  const containerRef = useRef(null);

  const selected = options.find(o => o.value === value);
  const q = search.trim().toLowerCase();
  const filtered = q
    ? options.filter(o => o.label.toLowerCase().includes(q))
    : options;

  useEffect(() => {
    if (!open) return;
    const handleClick = (e) => {
      if (containerRef.current && !containerRef.current.contains(e.target)) {
        setOpen(false);
        setSearch('');
      }
    };
    document.addEventListener('mousedown', handleClick);
    return () => document.removeEventListener('mousedown', handleClick);
  }, [open]);

  useEffect(() => {
    setHoveredIdx(0);
  }, [search]);

  const select = (val) => {
    onChange(val);
    setOpen(false);
    setSearch('');
  };

  const handleKey = (e) => {
    if (e.key === 'Escape') { setOpen(false); setSearch(''); }
    else if (e.key === 'ArrowDown') {
      e.preventDefault();
      setHoveredIdx(i => Math.min(i + 1, filtered.length - 1));
    } else if (e.key === 'ArrowUp') {
      e.preventDefault();
      setHoveredIdx(i => Math.max(i - 1, 0));
    } else if (e.key === 'Enter') {
      e.preventDefault();
      if (filtered[hoveredIdx]) select(filtered[hoveredIdx].value);
    }
  };

  const highlight = (text) => {
    if (!q) return text;
    const idx = text.toLowerCase().indexOf(q);
    if (idx === -1) return text;
    return (
      <>
        {text.slice(0, idx)}
        <span className="bg-yellow-100 text-slate-900 font-semibold rounded px-0.5">{text.slice(idx, idx + q.length)}</span>
        {text.slice(idx + q.length)}
      </>
    );
  };

  return (
    <div ref={containerRef} className="relative">
      <button
        type="button"
        onClick={() => setOpen(o => !o)}
        className={`field-input text-left flex items-center justify-between cursor-pointer ${selected ? 'text-slate-900' : 'text-slate-400'}`}>
        <span className="truncate">
          {selected ? <>{selected.label}{selected.custom ? ' ✨' : ''}</> : placeholder}
        </span>
        <Icon name="chevron" className={`w-4 h-4 text-slate-400 flex-shrink-0 ml-2 transition-transform ${open ? 'rotate-180' : ''}`} />
      </button>

      {open && (
        <div className="absolute z-30 mt-1.5 w-full bg-white rounded-xl border border-slate-200 shadow-xl overflow-hidden">
          <div className="p-2 border-b border-slate-100 bg-slate-50">
            <div className="relative">
              <svg className="w-4 h-4 absolute left-3 top-1/2 -translate-y-1/2 text-slate-400" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                <circle cx="11" cy="11" r="7" strokeWidth="2" />
                <path strokeLinecap="round" strokeWidth="2" d="M21 21l-4.3-4.3" />
              </svg>
              <input
                autoFocus
                value={search}
                onChange={e => setSearch(e.target.value)}
                onKeyDown={handleKey}
                placeholder="พิมพ์เพื่อค้นหา..."
                className="w-full pl-9 pr-3 py-2 rounded-lg border border-slate-200 bg-white text-sm focus:border-emerald-400 focus:ring-2 focus:ring-emerald-100 outline-none" />
            </div>
          </div>

          <div className="max-h-64 overflow-y-auto scrollbar">
            {filtered.length === 0 ? (
              <div className="px-4 py-6 text-center text-sm text-slate-400">
                ไม่พบตัวเลือกที่ตรงกับ "<span className="font-medium text-slate-600">{search}</span>"
              </div>
            ) : (
              filtered.map((o, i) => (
                <button
                  key={o.value}
                  type="button"
                  onClick={() => select(o.value)}
                  onMouseEnter={() => setHoveredIdx(i)}
                  className={`w-full text-left px-4 py-2 text-sm flex items-center justify-between transition-colors ${
                    o.value === value
                      ? 'bg-emerald-50 text-emerald-800 font-medium'
                      : i === hoveredIdx
                        ? 'bg-slate-50 text-slate-900'
                        : 'text-slate-700 hover:bg-slate-50'
                  }`}>
                  <span className="truncate">{highlight(o.label)}{o.custom && <span className="ml-1">✨</span>}</span>
                  {o.value === value && <span className="text-emerald-600 ml-2">✓</span>}
                </button>
              ))
            )}
          </div>

          {onAddNew && (
            <button
              type="button"
              onClick={() => { setOpen(false); setSearch(''); onAddNew(search); }}
              className="w-full text-left px-4 py-2.5 text-sm font-medium text-emerald-700 bg-emerald-50/60 hover:bg-emerald-100 border-t border-emerald-200 flex items-center gap-2">
              <Icon name="plus" className="w-4 h-4" />
              <span>{addNewLabel}{search && <span className="text-slate-500 font-normal"> ("{search}")</span>}</span>
            </button>
          )}
        </div>
      )}
    </div>
  );
}

const Select = SearchableSelect;

function App() {
  const [form, setForm] = useState({
    code: '',
    unit: '',
    dosageForm: '',
    criteriaType: 'numeric',
    testName: '',
    target: '',
    tolerance: '0',
    minValue: '',
    maxValue: '',
    passDefinition: '',
    failDefinition: '',
    defaultExpected: 'pass',
    visualCriteria: '',
    visualChecklist: ['ผิวเรียบ ไม่มีรอยร้าว', 'สีสม่ำเสมอตามมาตรฐาน', 'ไม่มีสิ่งแปลกปลอม'],
    visualReference: '',

                                  </div>
                                  <div className="rounded-lg bg-emerald-50 border border-emerald-200 p-2.5 text-center">
                                    <div className="text-[10px] text-emerald-600 uppercase tracking-wide flex items-center justify-center gap-1">
                                      <span className="bg-emerald-100 text-emerald-700 px-1 rounded text-[9px]">⚡ Auto</span>
                                      ต้องผ่าน
                                    </div>
                                    <div className="text-base font-bold text-emerald-700">{passNeeded}</div>
                                    <div className="text-[10px] text-emerald-500">ขั้นต่ำ</div>
                                  </div>
                                </div>
                              )}

                              {n > 0 && (
                                <p className="mt-2 text-[11px] text-slate-500 text-center">
                                  สูตร: <span className="font-mono">{n} × {tol}% = {allowedFails}</span> (ปัดลง)
                                </p>
                              )}
                            </>
                          );
                        })()}

                        <div className="mt-3 pt-3 border-t border-slate-100">
                          <label className="field-label">เมื่อ Stage นี้ไม่ผ่าน (On Fail)</label>
                          <div className="flex gap-2">
                            <button
                              type="button"
                              onClick={() => updateStage(stage.id, 'onFail', 'next')}
                              disabled={idx === form.stages.length - 1}
                              className={`flex-1 px-3 py-2 rounded-lg text-xs font-medium border transition-all ${
                                stage.onFail === 'next' && idx !== form.stages.length - 1
                                  ? 'bg-amber-50 border-amber-300 text-amber-800'
                                  : 'bg-white border-slate-200 text-slate-500 hover:border-slate-300'
                              } ${idx === form.stages.length - 1 ? 'opacity-40 cursor-not-allowed' : ''}`}>
                              → ทดสอบ Stage ถัดไป
                            </button>
                            <button
                              type="button"
                              onClick={() => updateStage(stage.id, 'onFail', 'reject')}
                              className={`flex-1 px-3 py-2 rounded-lg text-xs font-medium border transition-all ${
                                stage.onFail === 'reject'
                                  ? 'bg-red-50 border-red-300 text-red-700'
                                  : 'bg-white border-slate-200 text-slate-500 hover:border-slate-300'
                              }`}>
                              ✕ Reject Batch
                            </button>
                            <button
                              type="button"
                              onClick={() => updateStage(stage.id, 'onFail', 'deviation')}
                              className={`flex-1 px-3 py-2 rounded-lg text-xs font-medium border transition-all ${
                                stage.onFail === 'deviation'
                                  ? 'bg-orange-50 border-orange-300 text-orange-700'
                                  : 'bg-white border-slate-200 text-slate-500 hover:border-slate-300'
                              }`}>
                              ⚠ บันทึก Deviation
                            </button>
                          </div>

                          {stage.onFail === 'deviation' && (
                            <div className="mt-3 rounded-lg border border-orange-200 bg-orange-50/60 p-3">
                              <div className="flex items-center justify-between mb-2">
                                <div className="flex items-center gap-2">
                                  <span className="text-orange-600">⚠</span>
                                  <span className="text-xs font-semibold text-orange-800">Deviation Record (Auto-generated)</span>
                                </div>
                                <span className="text-[10px] font-mono bg-white px-2 py-0.5 rounded border border-orange-200 text-orange-700">
                                  DEV-{new Date().getFullYear()}-XXXX
                                </span>
                              </div>
                              <div className="grid grid-cols-2 gap-x-4 gap-y-1.5 text-[11px] text-slate-600">
                                <div className="flex justify-between">
                                  <span className="text-slate-400">Type:</span>
                                  <span className="font-medium text-slate-700">Quality / IPC Failure</span>
                                </div>
                                <div className="flex justify-between">
                                  <span className="text-slate-400">Severity:</span>
                                  <span className="font-medium text-slate-700">Minor → Investigate</span>
                                </div>
                                <div className="flex justify-between">
                                  <span className="text-slate-400">Source:</span>
                                  <span className="font-medium text-slate-700">Stage {stage.id}</span>
                                </div>
                                <div className="flex justify-between">
                                  <span className="text-slate-400">Status:</span>
                                  <span className="font-medium text-amber-600">Pending Investigation</span>
                                </div>
                                <div className="flex justify-between">
                                  <span className="text-slate-400">Assignee:</span>
                                  <span className="font-medium text-slate-700">QA Manager</span>
                                </div>
                                <div className="flex justify-between">
                                  <span className="text-slate-400">SLA:</span>
                                  <span className="font-medium text-slate-700">24 ชม.</span>
                                </div>
                              </div>
                              <div className="mt-2 pt-2 border-t border-orange-200/70 text-[11px] text-orange-800">
                                Batch จะถูก <strong>HOLD</strong> รอ QA ตัดสินใจ — Accept with justification, Rework, หรือ Reject
                              </div>
                            </div>
                          )}
                        </div>
                      </div>

                      {idx < form.stages.length - 1 && (
                        <div className="flex justify-center">
                          <div className="flex items-center gap-2 text-xs text-slate-400">
                            <Icon name="arrowDown" className="w-3 h-3" />
                            <span>ถ้า Stage {stage.id} ไม่ผ่าน</span>
                            <Icon name="arrowDown" className="w-3 h-3" />
                          </div>
                        </div>
                      )}
                    </React.Fragment>
                  ))}

                  {form.stages.length < 3 && (
                    <button
                      type="button"
                      onClick={addStage}
                      className="w-full py-3 rounded-xl border-2 border-dashed border-slate-300 text-slate-500 text-sm font-medium hover:border-emerald-400 hover:text-emerald-600 hover:bg-emerald-50/30 transition-all flex items-center justify-center gap-2">
                      <Icon name="plus" className="w-4 h-4" />
                      เพิ่ม Stage {form.stages.length + 1} (Retest)
                    </button>
                  )}
                </div>

                {/* Summary */}
                <div className="mt-4 pt-4 border-t border-slate-100 grid grid-cols-3 gap-4 text-center">
                  <div>
                    <div className="text-[11px] text-slate-500 uppercase tracking-wide">Total Stages</div>
                    <div className="text-lg font-bold text-emerald-700">{form.stages.length}</div>
                  </div>
                  <div>
                    <div className="text-[11px] text-slate-500 uppercase tracking-wide">Max Samples</div>
                    <div className="text-lg font-bold text-emerald-700">{cumulative[cumulative.length - 1] || 0}</div>
                  </div>
                  <div>
                    <div className="text-[11px] text-slate-500 uppercase tracking-wide">First Test</div>
                    <div className="text-lg font-bold text-emerald-700">{form.stages[0]?.sampleSize || 0} units</div>
                  </div>
                </div>
              </div>

              {/* Section 4 — Settings */}
              <div className="col-span-2 flex items-center gap-3 mt-3">
                <span className="w-7 h-7 rounded-lg bg-emerald-600 text-white flex items-center justify-center text-xs font-bold">4</span>
                <h3 className="font-semibold text-slate-900 text-sm">การตั้งค่า <span className="text-slate-400 font-normal">— Settings</span></h3>
                <div className="flex-1 h-px bg-slate-100"></div>
              </div>

              <div className="sm:col-span-2 grid grid-cols-1 sm:grid-cols-2 gap-3 sm:gap-4">
                <label className={`flex items-center gap-3 p-4 rounded-xl border cursor-pointer transition-all ${form.critical ? 'bg-red-50 border-red-200' : 'bg-white border-slate-200 hover:bg-slate-50'}`}>
                  <Toggle value={form.critical} onChange={v => set('critical', v)} label="" />
                  <div>
                    <div className="text-sm font-semibold text-slate-900 flex items-center gap-1.5">
                      Critical Test
                      {autoFilled.has('critical') && <AutoBadge />}
                    </div>
                    <div className="text-[11px] text-slate-500">ถ้า fail จะ block batch ทันที</div>
                  </div>
                </label>
                <label className={`flex items-center gap-3 p-4 rounded-xl border cursor-pointer transition-all ${form.active ? 'bg-emerald-50 border-emerald-200' : 'bg-white border-slate-200 hover:bg-slate-50'}`}>
                  <Toggle value={form.active} onChange={v => set('active', v)} label="" />
                  <div>
                    <div className="text-sm font-semibold text-slate-900">Active</div>
                    <div className="text-[11px] text-slate-500">เปิดใช้กับ batch ใหม่</div>
                  </div>
                </label>
              </div>
            </div>
          </div>
            </div>

            {/* Live Preview Panel */}
            <aside className="xl:col-span-1">
              <div className="xl:sticky xl:top-24 space-y-4">
                <div className="panel p-5">
                  <div className="flex items-center gap-2 mb-4 pb-3 border-b border-slate-100">
                    <span className="w-9 h-9 rounded-lg bg-gradient-to-br from-emerald-500 to-emerald-600 text-white flex items-center justify-center shadow-sm">
                      <svg className="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                        <rect x="2.5" y="4" width="19" height="13" rx="2" strokeWidth="1.8" />
                        <path d="M9 21h6M12 17v4" strokeWidth="1.8" strokeLinecap="round" />
                        <path d="M6 8h7M6 11h5" strokeWidth="1.8" strokeLinecap="round" />
                        <circle cx="17" cy="9" r="1.2" fill="currentColor" />
                      </svg>
                    </span>
                    <div className="flex-1">
                      <h3 className="font-semibold text-slate-900 text-sm flex items-center gap-1.5">
                        Live Preview
                        <span className="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse"></span>
                      </h3>
                      <p className="text-[11px] text-slate-500">ตัวอย่างที่ operator จะเห็น</p>
                    </div>
                  </div>

                  {/* Preview card */}
                  <div className="rounded-xl border border-slate-200 bg-gradient-to-br from-white to-slate-50 p-4 mb-4">
                    <div className="flex items-start justify-between mb-2">
                      <div className="flex flex-wrap gap-1.5">
                        {form.code && <span className="text-[10px] font-mono font-bold bg-emerald-100 text-emerald-700 px-2 py-0.5 rounded">{form.code}</span>}
                        {form.critical && <span className="text-[10px] font-bold bg-red-100 text-red-700 px-2 py-0.5 rounded">⚠ CRITICAL</span>}
                        {!form.active && <span className="text-[10px] bg-slate-100 text-slate-500 px-2 py-0.5 rounded">INACTIVE</span>}
                      </div>
                    </div>
                    <div className="text-sm font-semibold text-slate-900 mb-1">
                      {selectedTestLabel || <span className="text-slate-400 italic font-normal">— ยังไม่ได้เลือก Test —</span>}
                    </div>
                    {form.dosageForm && (
                      <div className="text-[11px] text-slate-500 mb-3">
                        {dosageForms.find(d => d.value === form.dosageForm)?.label}
                      </div>
                    )}

                    {form.criteriaType === 'numeric' && hasCalc && (
                      <div className="bg-emerald-50 rounded-lg p-2.5 text-center">
                        <div className="text-[10px] text-emerald-600 uppercase tracking-wide">Spec Range</div>
                        <div className="font-mono font-bold text-emerald-800 text-sm mt-1">
                          {calcMin} ≤ value ≤ {calcMax}
                        </div>
                        <div className="text-[10px] text-emerald-600 mt-0.5">
                          {form.target} ± {form.tolerance}% {form.unit && `(${units.find(u => u.value === form.unit)?.label.split(' —')[0] || form.unit})`}
                        </div>
                      </div>
                    )}
                    {form.criteriaType === 'pass_fail' && (
                      <div className="grid grid-cols-2 gap-1.5 mt-2">
                        <div className="bg-emerald-50 rounded-lg p-2 text-[11px]">
                          <div className="font-semibold text-emerald-700 mb-0.5">✓ PASS</div>
                          <div className="text-emerald-900/80 line-clamp-2">{form.passDefinition || <span className="italic text-emerald-600/50">—</span>}</div>
                        </div>
                        <div className="bg-red-50 rounded-lg p-2 text-[11px]">
                          <div className="font-semibold text-red-700 mb-0.5">✕ FAIL</div>
                          <div className="text-red-900/80 line-clamp-2">{form.failDefinition || <span className="italic text-red-600/50">—</span>}</div>
                        </div>
                      </div>
                    )}
                    {form.criteriaType === 'visual' && (
                      <div className="bg-amber-50 rounded-lg p-2.5 text-[11px]">
                        <div className="font-semibold text-amber-700 mb-1">👁 ตรวจด้วยสายตา</div>
                        <div className="text-amber-900/80 line-clamp-2">{form.visualCriteria || <span className="italic">—</span>}</div>
                        {form.visualChecklist.length > 0 && (
                          <div className="mt-1.5 text-[10px] text-amber-700">{form.visualChecklist.filter(Boolean).length} จุดตรวจ</div>
                        )}
                      </div>
                    )}
                    {form.criteriaType === 'text' && (
                      <div className="bg-slate-100 rounded-lg p-2.5 text-[11px]">
                        <div className="text-slate-500 mb-0.5">Format:</div>
                        <div className="font-mono text-slate-700">{form.textFormat || <span className="italic text-slate-400">—</span>}</div>
                      </div>
                    )}
                  </div>

                  {/* Stage flow */}
                  <div>
                    <div className="text-[11px] font-semibold text-slate-500 uppercase tracking-wide mb-2">Acceptance Flow</div>
                    <div className="space-y-1.5">
                      {form.stages.map((s, i) => {
                        const n = parseInt(s.sampleSize) || 0;
                        const tol = parseFloat(s.failureTolerance) || 0;
                        const allowed = Math.floor(n * tol / 100);
                        return (
                          <React.Fragment key={s.id}>
                            <div className="flex items-center gap-2 text-xs">
                              <span className={`w-6 h-6 rounded-md flex items-center justify-center font-bold text-[10px] flex-shrink-0 ${i === 0 ? 'bg-emerald-600 text-white' : 'bg-amber-500 text-white'}`}>S{s.id}</span>
                              <div className="flex-1 min-w-0 bg-white border border-slate-200 rounded-lg px-2 py-1.5">
                                <div className="font-medium text-slate-700 truncate">สุ่ม {n} ชิ้น · เสียได้ {allowed}</div>
                                <div className="text-[10px] text-slate-400">tolerance {tol}%</div>
                              </div>
                            </div>
                            {i < form.stages.length - 1 && (
                              <div className="ml-3 text-[10px] text-slate-400 pl-2 border-l-2 border-dashed border-slate-200">
                                ↓ ถ้าไม่ผ่าน
                              </div>
                            )}
                          </React.Fragment>
                        );
                      })}
                      <div className="flex items-center gap-2 text-xs mt-1">
                        <span className={`w-6 h-6 rounded-md flex items-center justify-center font-bold text-[10px] flex-shrink-0 ${
                          form.stages[form.stages.length - 1]?.onFail === 'reject' ? 'bg-red-500 text-white' :
                          form.stages[form.stages.length - 1]?.onFail === 'deviation' ? 'bg-orange-500 text-white' : 'bg-slate-300 text-white'
                        }`}>!</span>
                        <div className="text-[11px] font-semibold">
                          {form.stages[form.stages.length - 1]?.onFail === 'reject' && <span className="text-red-600">✕ Reject Batch</span>}
                          {form.stages[form.stages.length - 1]?.onFail === 'deviation' && <span className="text-orange-600">⚠ บันทึก Deviation</span>}
                          {form.stages[form.stages.length - 1]?.onFail === 'next' && <span className="text-slate-500">→ ทดสอบต่อ</span>}
                        </div>
                      </div>
                    </div>
                  </div>
                </div>

                {/* Quick stats */}
                <div className="panel p-4">
                  <div className="text-[11px] font-semibold text-slate-500 uppercase tracking-wide mb-3">Summary</div>
                  <div className="space-y-2 text-xs">
                    <div className="flex justify-between"><span className="text-slate-500">Stages:</span><span className="font-bold text-slate-700">{form.stages.length}</span></div>
                    <div className="flex justify-between"><span className="text-slate-500">Max samples:</span><span className="font-bold text-slate-700">{form.stages.reduce((s, st) => s + (parseInt(st.sampleSize) || 0), 0)}</span></div>
                    <div className="flex justify-between"><span className="text-slate-500">Check every:</span><span className="font-bold text-slate-700">{form.checkInterval} min</span></div>
                    <div className="flex justify-between"><span className="text-slate-500">Sampling:</span><span className="font-medium text-slate-700 truncate ml-2">{samplingMethods.find(m => m.value === form.samplingMethod)?.label.split(' —')[0] || '—'}</span></div>
                  </div>
                </div>
              </div>
            </aside>
          </div>

          {/* Sticky footer actions */}
          <div className="sticky bottom-0 mt-6 -mx-4 sm:-mx-6 lg:-mx-8 px-4 sm:px-6 lg:px-8 py-3 sm:py-4 bg-white/90 backdrop-blur-sm border-t border-slate-200 flex flex-col sm:flex-row sm:items-center sm:justify-between gap-2 sm:gap-3 z-20">
            <div className="text-xs text-slate-500 truncate">
              {form.testName ? (
                <span className="flex items-center gap-2">
                  <span className="w-2 h-2 rounded-full bg-emerald-500 animate-pulse flex-shrink-0"></span>
                  <span className="truncate">พร้อมบันทึก: <span className="font-semibold text-slate-700">{form.code || '(ยังไม่มี Code)'}</span></span>
                </span>
              ) : (
                <span className="text-amber-600">⚠ กรุณาเลือก Test Name ก่อน</span>
              )}
            </div>
            <div className="flex gap-2 sm:gap-3 flex-shrink-0">
              <button className="btn btn-ghost flex-1 sm:flex-initial">CANCEL</button>
              <button className="btn btn-primary flex-1 sm:flex-initial" disabled={!form.testName || !form.code}>CREATE</button>
            </div>
          </div>
        </div>
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
