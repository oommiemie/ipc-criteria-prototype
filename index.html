<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>IPC Criteria — New</title>
<script src="https://cdn.tailwindcss.com"></script>
<script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Sarabun:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --brand: #10b981;
    --brand-dark: #047857;
    --brand-soft: #ecfdf5;
  }
  html, body, #root { height: 100%; }
  body {
    font-family: 'Inter', 'Sarabun', system-ui, sans-serif;
    background: #f8fafc;
    color: #0f172a;
  }
  .field-input {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid #e2e8f0;
    border-radius: 10px;
    background: #fff;
    font-size: 14px;
    color: #0f172a;
    transition: all .15s ease;
    outline: none;
  }
  .field-input::placeholder { color: #94a3b8; }
  .field-input:hover { border-color: #cbd5e1; }
  .field-input:focus {
    border-color: var(--brand);
    box-shadow: 0 0 0 3px rgba(16,185,129,.15);
  }
  .field-label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: #334155;
    margin-bottom: 6px;
  }
  .req { color: #ef4444; margin-left: 2px; }
  .helper { font-size: 12px; color: #64748b; margin-top: 6px; }
  .panel {
    background: #fff;
    border: 1px solid #e2e8f0;
    border-radius: 16px;
    box-shadow: 0 1px 2px rgba(15,23,42,.04), 0 8px 24px rgba(15,23,42,.04);
  }
  .sub-panel {
    background: var(--brand-soft);
    border: 1px solid #a7f3d0;
    border-radius: 14px;
  }
  .sidebar-item {
    display: flex; align-items: center; gap: 10px;
    padding: 9px 12px; border-radius: 10px;
    color: #cbd5e1; font-size: 14px; cursor: pointer;
    transition: background .15s, color .15s;
  }
  .sidebar-item:hover { background: rgba(255,255,255,.05); color: #fff; }
  .sidebar-item.active { background: rgba(16,185,129,.15); color: #6ee7b7; }
  .sidebar-sub { padding-left: 36px; font-size: 13px; color: #94a3b8; }
  .sidebar-sub:hover { color: #fff; }
  .toggle {
    position: relative; width: 38px; height: 22px;
    background: #cbd5e1; border-radius: 999px; cursor: pointer;
    transition: background .15s;
  }
  .toggle.on { background: var(--brand); }
  .toggle .knob {
    position: absolute; top: 2px; left: 2px;
    width: 18px; height: 18px; background: #fff; border-radius: 50%;
    transition: transform .15s; box-shadow: 0 1px 3px rgba(0,0,0,.2);
  }
  .toggle.on .knob { transform: translateX(16px); }
  .btn {
    padding: 10px 20px; border-radius: 10px; font-weight: 600;
    font-size: 14px; cursor: pointer; transition: all .15s;
    border: 1px solid transparent;
  }
  .btn-ghost { background: #fff; border-color: #e2e8f0; color: #475569; }
  .btn-ghost:hover { background: #f1f5f9; }
  .btn-primary { background: var(--brand); color: #fff; }
  .btn-primary:hover { background: var(--brand-dark); }
  .chip {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 4px 10px; border-radius: 999px;
    background: #ecfdf5; color: #047857;
    font-size: 12px; font-weight: 500;
  }
  .scrollbar::-webkit-scrollbar { width: 8px; }
  .scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 999px; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="react">
const { useState, useRef, useEffect } = React;

const Icon = ({ name, className = "w-4 h-4" }) => {
  const paths = {
    flask: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 3h6m-5 0v6L4 19a2 2 0 001.7 3h12.6a2 2 0 001.7-3l-6-10V3" />,
    leaf: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M3 12c0-5 4-9 9-9 5 0 9 4 9 9-5 0-9 4-9 9 0-5-4-9-9-9z" />,
    dashboard: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 5h6v6H4zM14 5h6v4h-6zM14 13h6v6h-6zM4 15h6v4H4z" />,
    box: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M21 8L12 3 3 8m18 0v8l-9 5-9-5V8m18 0l-9 5m0 0L3 8m9 5v9" />,
    cog: <><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 15a3 3 0 100-6 3 3 0 000 6z" /><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M19.4 15a1.7 1.7 0 00.3 1.8l.1.1a2 2 0 11-2.8 2.8l-.1-.1a1.7 1.7 0 00-1.8-.3 1.7 1.7 0 00-1 1.5V21a2 2 0 11-4 0v-.1a1.7 1.7 0 00-1.1-1.5 1.7 1.7 0 00-1.8.3l-.1.1a2 2 0 11-2.8-2.8l.1-.1a1.7 1.7 0 00.3-1.8 1.7 1.7 0 00-1.5-1H3a2 2 0 110-4h.1A1.7 1.7 0 004.6 9a1.7 1.7 0 00-.3-1.8l-.1-.1a2 2 0 112.8-2.8l.1.1a1.7 1.7 0 001.8.3H9a1.7 1.7 0 001-1.5V3a2 2 0 114 0v.1a1.7 1.7 0 001 1.5 1.7 1.7 0 001.8-.3l.1-.1a2 2 0 112.8 2.8l-.1.1a1.7 1.7 0 00-.3 1.8V9a1.7 1.7 0 001.5 1H21a2 2 0 110 4h-.1a1.7 1.7 0 00-1.5 1z" /></>,
    shield: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />,
    cart: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M3 3h2l.4 2M7 13h11l3-8H6.4M7 13L5.4 5M7 13l-1.7 5h13.4M9 21a1 1 0 100-2 1 1 0 000 2zm9 0a1 1 0 100-2 1 1 0 000 2z" />,
    coin: <><circle cx="12" cy="12" r="9" strokeWidth="2" /><path strokeLinecap="round" strokeWidth="2" d="M12 7v10M9.5 9.5h4a1.5 1.5 0 010 3h-3a1.5 1.5 0 000 3H14" /></>,
    chart: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M3 3v18h18M7 14l3-3 4 4 5-7" />,
    chevron: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M19 9l-7 7-7-7" />,
    user: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M16 11a4 4 0 10-8 0 4 4 0 008 0zM12 14c-4 0-7 2-7 5v1h14v-1c0-3-3-5-7-5z" />,
    file: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 12h6m-6 4h6M7 21h10a2 2 0 002-2V7l-5-5H7a2 2 0 00-2 2v15a2 2 0 002 2z" />,
    template: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 5h16v4H4zM4 11h7v9H4zM13 11h7v4h-7zM13 17h7v3h-7z" />,
    alert: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 9v4m0 4h.01M10.3 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.7 3.86a2 2 0 00-3.4 0z" />,
    logout: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V6a3 3 0 013-3h4a3 3 0 013 3v1" />,
    dice: <><rect x="3" y="3" width="18" height="18" rx="3" strokeWidth="2" /><circle cx="8" cy="8" r="1.2" fill="currentColor" /><circle cx="16" cy="8" r="1.2" fill="currentColor" /><circle cx="12" cy="12" r="1.2" fill="currentColor" /><circle cx="8" cy="16" r="1.2" fill="currentColor" /><circle cx="16" cy="16" r="1.2" fill="currentColor" /></>,
    layers: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" />,
    plus: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 5v14M5 12h14" />,
    trash: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M3 6h18M8 6V4a2 2 0 012-2h4a2 2 0 012 2v2m3 0v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6h14z" />,
    arrowDown: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 5v14m-7-7l7 7 7-7" />,
    info: <><circle cx="12" cy="12" r="9" strokeWidth="2" /><path strokeLinecap="round" strokeWidth="2" d="M12 8h.01M11 12h1v4h1" /></>
  };
  return (
    <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor">
      {paths[name]}
    </svg>
  );
};

    { icon: 'leaf', label: 'Production', expandable: true, expanded: true, children: [

    { icon: 'cart', label: 'Sales', expandable: true },

      <div className="px-4 py-5 flex items-center gap-3 border-b border-slate-800">
        <div className="w-10 h-10 rounded-xl bg-emerald-500/20 flex items-center justify-center text-emerald-400">
          <Icon name="leaf" className="w-6 h-6" />
        </div>
        <div className="flex-1">
          <div className="font-semibold leading-tight">Herbal ERP</div>
          <div className="text-[11px] text-slate-400">Medicine Management</div>
        </div>
        <button type="button" onClick={onClose}
          className="lg:hidden p-1 text-slate-400 hover:text-white">

        <div className="flex-1">
          <div className="text-sm font-medium">Administrator</div>

function BulkGenerateInline({ onGenerate }) {
  const [open, setOpen] = useState(false);
  const [name, setName] = useState('');
  const [count, setCount] = useState('10');
  const [type, setType] = useState('number');
  const [unit, setUnit] = useState('mg');

  const submit = () => {
    if (!name.trim() || !parseInt(count)) return;
    onGenerate(name.trim(), count, type, unit);
    setName(''); setOpen(false);
  };

  if (!open) {
    return (
      <button type="button" onClick={() => setOpen(true)}
        className="px-3 py-2 rounded-lg bg-white border border-violet-300 text-violet-700 hover:bg-violet-50 text-xs font-medium flex items-center gap-1">
        ⚡ สร้างชุดฟิลด์
      </button>
    );
  }
  return (
    <div className="w-full p-3 rounded-xl bg-violet-50 border-2 border-violet-300">
      <div className="text-xs font-semibold text-violet-800 mb-2">⚡ สร้างฟิลด์ชุดอัตโนมัติ (เช่น Punch 1-30)</div>
      <div className="grid grid-cols-2 sm:grid-cols-4 gap-2">
        <input className="field-input text-sm" placeholder="ชื่อ base (เช่น Punch)"
          value={name} onChange={e => setName(e.target.value)} autoFocus />
        <input className="field-input text-sm" type="number" placeholder="จำนวน"
          value={count} onChange={e => setCount(e.target.value)} />
        <select className="field-input text-sm cursor-pointer"
          value={type} onChange={e => setType(e.target.value)}>
          <option value="number">Number</option>
          <option value="text">Text</option>
          <option value="pass_fail">Pass/Fail</option>
        </select>
        <input className="field-input text-sm" placeholder="หน่วย (mg, mm)"
          value={unit} onChange={e => setUnit(e.target.value)} />
      </div>
      <div className="flex gap-2 mt-2">
        <button type="button" onClick={submit}
          className="flex-1 px-3 py-1.5 rounded-lg bg-violet-600 text-white text-xs font-medium hover:bg-violet-700">
          สร้าง {parseInt(count) || 0} ฟิลด์ ({name || '...'} 1-{parseInt(count) || 'N'})
        </button>
        <button type="button" onClick={() => setOpen(false)}
          className="px-3 py-1.5 rounded-lg bg-white border border-slate-200 text-slate-600 text-xs font-medium hover:bg-slate-50">
          ยกเลิก
        </button>
      </div>
    </div>
  );
}

function CustomOptionAdder({ onAdd, placeholder }) {
  const [adding, setAdding] = useState(false);
  const [val, setVal] = useState('');
  const submit = () => {
    const v = val.trim();
    if (!v) return;
    onAdd(v);
    setVal('');
    setAdding(false);
  };
  if (!adding) {
    return (
      <button type="button" onClick={() => setAdding(true)}
        className="text-xs text-emerald-700 hover:text-emerald-900 font-medium mt-1 flex items-center gap-1">
        <Icon name="plus" className="w-3 h-3" /> เพิ่มตัวเลือก
      </button>
    );
  }
  return (
    <div className="flex gap-1.5 mt-1.5">
      <input className="field-input flex-1 text-sm"
        placeholder={placeholder}
        value={val}
        onChange={e => setVal(e.target.value)}
        onKeyDown={e => {
          if (e.key === 'Enter') { e.preventDefault(); submit(); }
          if (e.key === 'Escape') { setAdding(false); setVal(''); }
        }}
        autoFocus />
      <button type="button" onClick={submit} disabled={!val.trim()}
        className="px-3 rounded-lg bg-emerald-600 text-white text-xs font-medium hover:bg-emerald-700 disabled:opacity-40">เพิ่ม</button>
      <button type="button" onClick={() => { setAdding(false); setVal(''); }}
        className="px-3 rounded-lg bg-white border border-slate-200 text-slate-600 text-xs font-medium hover:bg-slate-50">ยกเลิก</button>
    </div>
  );
}

function Toggle({ value, onChange, label }) {
  return (
    <label className="inline-flex items-center gap-2 cursor-pointer select-none">
      <span className={`toggle ${value ? 'on' : ''}`} onClick={() => onChange(!value)}>
        <span className="knob" />
      </span>
      <span className="text-sm font-medium text-slate-700">{label}</span>
    </label>
  );
}

function AddOptionModal({ open, title, fields, onCancel, onSubmit, prefill }) {
  const [values, setValues] = useState({});

  React.useEffect(() => {
    if (open) {
      const init = {};
      fields.forEach(f => init[f.key] = (prefill && prefill[f.key]) || '');
      setValues(init);
    }
  }, [open]);

  if (!open) return null;

  const canSubmit = fields.filter(f => f.required !== false).every(f => (values[f.key] || '').trim());

  const submit = () => {
    if (!canSubmit) return;
    onSubmit(values);
  };

  return (
    <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/40 backdrop-blur-sm"
      onClick={onCancel}>
      <div className="bg-white rounded-2xl shadow-2xl w-full max-w-md overflow-hidden"
        onClick={e => e.stopPropagation()}>
        <div className="px-6 py-4 border-b border-slate-100 flex items-center gap-3">
          <div className="w-9 h-9 rounded-lg bg-emerald-50 text-emerald-600 flex items-center justify-center">
            <Icon name="plus" className="w-5 h-5" />
          </div>
          <div>
            <h3 className="font-semibold text-slate-900">{title}</h3>
            <p className="text-xs text-slate-500">กรอกข้อมูลเพื่อเพิ่มตัวเลือกใหม่</p>
          </div>
        </div>

        <div className="p-6 space-y-4">
          {fields.map((f, i) => (
            <div key={f.key}>
              <label className="field-label">
                {f.label}
                {f.required !== false && <span className="req">*</span>}
              </label>
              {f.type === 'textarea' ? (
                <textarea
                  className="field-input min-h-[80px] resize-none"
                  placeholder={f.placeholder}
                  value={values[f.key] || ''}
                  onChange={e => setValues(v => ({ ...v, [f.key]: e.target.value }))} />
              ) : (
                <input
                  className="field-input"
                  placeholder={f.placeholder}
                  value={values[f.key] || ''}
                  autoFocus={i === 0}
                  onChange={e => setValues(v => ({ ...v, [f.key]: e.target.value }))}
                  onKeyDown={e => {
                    if (e.key === 'Enter' && canSubmit) submit();
                    if (e.key === 'Escape') onCancel();
                  }} />
              )}
              {f.helper && <p className="helper">{f.helper}</p>}
            </div>
          ))}
        </div>

        <div className="px-6 py-4 bg-slate-50 border-t border-slate-100 flex justify-end gap-2">
          <button type="button" onClick={onCancel} className="btn btn-ghost">ยกเลิก</button>
          <button type="button" onClick={submit} disabled={!canSubmit}
            className="btn btn-primary disabled:opacity-40 disabled:cursor-not-allowed">
            เพิ่ม
          </button>
        </div>
      </div>
    </div>
  );
}

function EditableSelect({ value, onChange, options, onAdd, placeholder, modalTitle, modalFields }) {
  const [modalOpen, setModalOpen] = useState(false);
  const [prefill, setPrefill] = useState('');

  return (
    <>
      <SearchableSelect
        value={value}
        onChange={onChange}
        options={options}
        placeholder={placeholder}
        onAddNew={(searchText) => {
          setPrefill(searchText || '');
          setModalOpen(true);
        }} />
      <AddOptionModal
        open={modalOpen}
        title={modalTitle}
        fields={modalFields}
        prefill={prefill ? { [modalFields[0].key]: prefill } : null}
        onCancel={() => setModalOpen(false)}
        onSubmit={(vals) => { onAdd(vals); setModalOpen(false); }} />
    </>
  );
}

function SearchableSelect({ value, onChange, options, placeholder, onAddNew, addNewLabel = "＋ เพิ่มตัวเลือกใหม่..." }) {
  const [open, setOpen] = useState(false);
  const [search, setSearch] = useState('');
  const [hoveredIdx, setHoveredIdx] = useState(0);
  const containerRef = useRef(null);

  const selected = options.find(o => o.value === value);
  const q = search.trim().toLowerCase();
  const filtered = q
    ? options.filter(o => o.label.toLowerCase().includes(q))
    : options;

  useEffect(() => {
    if (!open) return;
    const handleClick = (e) => {
      if (containerRef.current && !containerRef.current.contains(e.target)) {
        setOpen(false);
        setSearch('');
      }
    };
    document.addEventListener('mousedown', handleClick);
    return () => document.removeEventListener('mousedown', handleClick);
  }, [open]);

  useEffect(() => {
    setHoveredIdx(0);
  }, [search]);

  const select = (val) => {
    onChange(val);
    setOpen(false);
    setSearch('');
  };

  const handleKey = (e) => {
    if (e.key === 'Escape') { setOpen(false); setSearch(''); }
    else if (e.key === 'ArrowDown') {
      e.preventDefault();
      setHoveredIdx(i => Math.min(i + 1, filtered.length - 1));
    } else if (e.key === 'ArrowUp') {
      e.preventDefault();
      setHoveredIdx(i => Math.max(i - 1, 0));
    } else if (e.key === 'Enter') {
      e.preventDefault();
      if (filtered[hoveredIdx]) select(filtered[hoveredIdx].value);
    }
  };

  const highlight = (text) => {
    if (!q) return text;
    const idx = text.toLowerCase().indexOf(q);
    if (idx === -1) return text;
    return (
      <>
        {text.slice(0, idx)}

  return (

                <button

                  type="button"
                  onClick={() => select(o.value)}
                  onMouseEnter={() => setHoveredIdx(i)}
                  className={`w-full text-left px-4 py-2 text-sm flex items-center justify-between transition-colors ${
                    o.value === value
                      ? 'bg-emerald-50 text-emerald-800 font-medium'
                      : i === hoveredIdx
                        ? 'bg-slate-50 text-slate-900'
                        : 'text-slate-700 hover:bg-slate-50'
                  }`}>
                  <span className="truncate">{highlight(o.label)}{o.custom && <span className="ml-1">✨</span>}</span>
                  {o.value === value && <span className="text-emerald-600 ml-2">✓</span>}
                </button>
              ))
            )}
          </div>

          {onAddNew && (
            <button
              type="button"
              onClick={() => { setOpen(false); setSearch(''); onAddNew(search); }}
              className="w-full text-left px-4 py-2.5 text-sm font-medium text-emerald-700 bg-emerald-50/60 hover:bg-emerald-100 border-t border-emerald-200 flex items-center gap-2">
              <Icon name="plus" className="w-4 h-4" />
              <span>{addNewLabel}{search && <span className="text-slate-500 font-normal"> ("{search}")</span>}</span>
            </button>
          )}
        </div>
      )}
    </div>
  );
}

    total_ash:          { prefix: 'TA', unit: 'percent', samplingMethod: 'composite',            stages: [{id:1,sampleSize:'3',failureTolerance:'0',onFail:'reject'}], critical: false, target: '', tolerance: '0' },
    acid_insoluble_ash: { prefix: 'AIA',unit: 'percent', samplingMethod: 'composite',            stages: [{id:1,sampleSize:'3',failureTolerance:'0',onFail:'reject'}], critical: false, target: '', tolerance: '0' },
    heavy_metals:       { prefix: 'HM', unit: 'ppm',     samplingMethod: 'multi_site_composite', stages: [{id:1,sampleSize:'3',failureTolerance:'0',onFail:'reject'}], critical: true, target: '', tolerance: '0' },
    pesticide:          { prefix: 'PR', unit: 'ppm',     samplingMethod: 'multi_site_composite', stages: [{id:1,sampleSize:'3',failureTolerance:'0',onFail:'reject'}], critical: true, target: '', tolerance: '0' },
    aflatoxin:          { prefix: 'AF', unit: 'ppm',     samplingMethod: 'multi_site_composite', stages: [{id:1,sampleSize:'3',failureTolerance:'0',onFail:'reject'}], critical: true, target: '', tolerance: '0' },
  };

  const [autoFilled, setAutoFilled] = useState(new Set());

  const handleTestNameChange = (newValue) => {
    const meta = testMetadata[newValue];
    setForm(prev => {
      const updates = { testName: newValue };
      const filled = [];
      if (meta) {
        const seq = String(Math.floor(Math.random() * 900) + 100);
        if (!prev.code || prev.code.startsWith('IPC-')) {
          updates.code = `IPC-${meta.prefix}-${seq}`;
          filled.push('code');
        }
        if (meta.unit && (!prev.unit || autoFilled.has('unit'))) {
          updates.unit = meta.unit;
          filled.push('unit');
        }
        if (meta.samplingMethod) {
          updates.samplingMethod = meta.samplingMethod;
          filled.push('samplingMethod');
        }
        if (meta.stages) {
          updates.stages = meta.stages;
          filled.push('stages');
        }
        if (meta.target && (!prev.target || autoFilled.has('target'))) {
          updates.target = meta.target;
          filled.push('target');
        }
        if (meta.tolerance !== undefined) {
          updates.tolerance = meta.tolerance;
          filled.push('tolerance');
        }
        updates.critical = meta.critical;
        if (meta.critical) filled.push('critical');
      }
      setAutoFilled(new Set(filled));
      return { ...prev, ...updates };
    });
  };

  const AutoBadge = () => (

    ...p, triggers: { ...p.triggers, [key]: { ...p.triggers[key], [field]: value } }
  }));
  const toggleTriggerOption = (key, optId) => setForm(p => ({
    ...p,
    triggers: {
      ...p.triggers,
      [key]: {
        ...p.triggers[key],
        options: p.triggers[key].options.map(o => o.id === optId ? { ...o, on: !o.on } : o)
      }
    }
  }));

    triggers: {

      [key]: {
        ...p.triggers[key],
        options: [...p.triggers[key].options, { id: `custom_${Date.now()}`, label, on: true, custom: true }]
      }
    }
  }));
  const removeCustomOption = (key, optId) => setForm(p => ({
    ...p,
    triggers: {
      ...p.triggers,
      [key]: {
        ...p.triggers[key],
        options: p.triggers[key].options.filter(o => o.id !== optId)
      }
    }
  }));

  // Estimated checks per batch (at reference batch size)
  const batchEstimate = (() => {
    const bsize = parseFloat(form.referenceBatchSize) || 0;
    const dur   = parseFloat(form.referenceBatchDurationHr) || 0;
    const t     = form.triggers;
    const checks = { time: 0, quantity: 0, milestone: 0, event: 0, oncePerBatch: 0 };
    if (t.time.on) {
      const every = parseFloat(t.time.every) || 0;
      if (every > 0 && dur > 0) checks.time = Math.floor((dur * 60) / every);
    }
    if (t.quantity.on) {
      if (t.quantity.mode === 'percent') {
        const p = parseFloat(t.quantity.percent) || 0;
        if (p > 0) checks.quantity = Math.floor(100 / p);
      } else {
        const every = parseFloat(t.quantity.every) || 0;
        if (every > 0 && bsize > 0) checks.quantity = Math.floor(bsize / every);
      }
    }
    if (t.milestone.on) checks.milestone = t.milestone.options.filter(o => o.on).length;
    if (t.event.on) checks.event = t.event.options.filter(o => o.on).length;
    if (t.oncePerBatch.on) checks.oncePerBatch = 1;
    const minTotal = checks.time + checks.quantity + checks.milestone + checks.oncePerBatch;
    const maxTotal = minTotal + checks.event;
    const samplesUsed = form.stages.reduce((s, st) => s + (parseInt(st.sampleSize) || 0), 0);
    const samplesTotal = samplesUsed * minTotal;
    const samplesPct = bsize > 0 ? ((samplesTotal / bsize) * 100) : 0;
    return { checks, minTotal, maxTotal, samplesPerCheck: samplesUsed, samplesTotal, samplesPct, batchSize: bsize };
  })();

    if (t.time.on) parts.push(`⏱ ทุก ${t.time.every} นาที`);
    if (t.quantity.on) parts.push(`📦 ทุก ${t.quantity.every} ${t.quantity.unit}`);
    if (t.milestone.on) {
      const n = t.milestone.options.filter(o => o.on).length;
      if (n) parts.push(`🎯 ${n} milestone${n>1?'s':''}`);
    }
    if (t.event.on) {
      const n = t.event.options.filter(o => o.on).length;
      if (n) parts.push(`⚡ ${n} event${n>1?'s':''}`);
    }
    if (t.oncePerBatch.on) parts.push(`✅ ครั้งเดียวต่อ batch`);
    return parts;
  })();

  const [mobileNavOpen, setMobileNavOpen] = useState(false);

  // √n + 1 helper for batch sampling (per Pharmacopoeia)
  const sqrtNplus1 = (n) => {
    const num = parseFloat(n);
    if (!num || num <= 0) return null;
    return Math.ceil(Math.sqrt(num)) + 1;
  };
  const recommendedBatchSample = sqrtNplus1(form.referenceBatchSize);

    const parts = [name];
    if (thaiName) parts.push(thaiName);
    const label = parts.join(' — ') + (reference ? ` (${reference})` : '');
    const newOpt = { value: `custom_${Date.now()}`, label, custom: true };

                  ]} />
              </div>
              <div>
                <label className="field-label">ประเภทเกณฑ์ (Criteria Type)<span className="req">*</span></label>
                <Select value={form.criteriaType} onChange={v => set('criteriaType', v)}
                  options={criteriaTypes} placeholder="Select criteria type" />

              {/* Section 2 — Specification */}
              <div className="col-span-2 flex items-center gap-3 mt-3">
                <span className="w-7 h-7 rounded-lg bg-emerald-600 text-white flex items-center justify-center text-xs font-bold">2</span>
                <h3 className="font-semibold text-slate-900 text-sm">เกณฑ์มาตรฐาน <span className="text-slate-400 font-normal">— Specification</span></h3>
                <div className="flex-1 h-px bg-slate-100"></div>

              <div className="col-span-2">

                  </div>
                  <div className="flex-1">
                    <div className={`text-xs font-semibold ${meta.titleClr}`}>รูปแบบการบันทึก: {meta.label}</div>
                    <div className={`text-[11px] ${meta.subClr}`}>{meta.desc}</div>
                  </div>
                </div>
              </div>

              {/* === NUMERIC === */}
              {form.criteriaType === 'numeric' && (
                <>

                                  <div className="rounded-lg bg-red-50 border border-red-200 p-2.5 text-center">
                                    <div className="text-[10px] text-red-600 uppercase tracking-wide flex items-center justify-center gap-1">
                                      <span className="bg-red-100 text-red-700 px-1 rounded text-[9px]">⚡ Auto</span>
                                      ยอมเสียได้
                                    </div>
                                    <div className="text-base font-bold text-red-700">{allowedFails}</div>
                                    <div className="text-[10px] text-red-500">ไม่เกินกี่ชิ้น</div>
                                  </div>
                                  <div className="rounded-lg bg-emerald-50 border border-emerald-200 p-2.5 text-center">
                                    <div className="text-[10px] text-emerald-600 uppercase tracking-wide flex items-center justify-center gap-1">
                                      <span className="bg-emerald-100 text-emerald-700 px-1 rounded text-[9px]">⚡ Auto</span>
                                      ต้องผ่าน
                                    </div>
                                    <div className="text-base font-bold text-emerald-700">{passNeeded}</div>
                                    <div className="text-[10px] text-emerald-500">ขั้นต่ำ</div>
                                  </div>
                                </div>
                              )}

                              {n > 0 && (
                                <p className="mt-2 text-[11px] text-slate-500 text-center">
                                  สูตร: <span className="font-mono">{n} × {tol}% = {allowedFails}</span> (ปัดลง)
                                </p>
                              )}
                            </>
                          );
                        })()}

                        <div className="mt-3 pt-3 border-t border-slate-100">
                          <label className="field-label">เมื่อ Stage นี้ไม่ผ่าน (On Fail)</label>
                          <div className="flex gap-2">
                            <button
                              type="button"
                              onClick={() => updateStage(stage.id, 'onFail', 'next')}
                              disabled={idx === form.stages.length - 1}
                              className={`flex-1 px-3 py-2 rounded-lg text-xs font-medium border transition-all ${
                                stage.onFail === 'next' && idx !== form.stages.length - 1
                                  ? 'bg-amber-50 border-amber-300 text-amber-800'
                                  : 'bg-white border-slate-200 text-slate-500 hover:border-slate-300'
                              } ${idx === form.stages.length - 1 ? 'opacity-40 cursor-not-allowed' : ''}`}>
                              → ทดสอบ Stage ถัดไป
                            </button>
                            <button
                              type="button"
                              onClick={() => updateStage(stage.id, 'onFail', 'reject')}
                              className={`flex-1 px-3 py-2 rounded-lg text-xs font-medium border transition-all ${
                                stage.onFail === 'reject'
                                  ? 'bg-red-50 border-red-300 text-red-700'
                                  : 'bg-white border-slate-200 text-slate-500 hover:border-slate-300'
                              }`}>
                              ✕ Reject Batch
                            </button>
                            <button
                              type="button"
                              onClick={() => updateStage(stage.id, 'onFail', 'deviation')}
                              className={`flex-1 px-3 py-2 rounded-lg text-xs font-medium border transition-all ${
                                stage.onFail === 'deviation'
                                  ? 'bg-orange-50 border-orange-300 text-orange-700'
                                  : 'bg-white border-slate-200 text-slate-500 hover:border-slate-300'
                              }`}>
                              ⚠ บันทึก Deviation
                            </button>
                          </div>

                          {stage.onFail === 'deviation' && (
                            <div className="mt-3 rounded-lg border border-orange-200 bg-orange-50/60 p-3">
                              <div className="flex items-center justify-between mb-2">
                                <div className="flex items-center gap-2">
                                  <span className="text-orange-600">⚠</span>
                                  <span className="text-xs font-semibold text-orange-800">Deviation Record (Auto-generated)</span>
                                </div>
                                <span className="text-[10px] font-mono bg-white px-2 py-0.5 rounded border border-orange-200 text-orange-700">
                                  DEV-{new Date().getFullYear()}-XXXX
                                </span>
                              </div>
                              <div className="grid grid-cols-2 gap-x-4 gap-y-1.5 text-[11px] text-slate-600">
                                <div className="flex justify-between">
                                  <span className="text-slate-400">Type:</span>
                                  <span className="font-medium text-slate-700">Quality / IPC Failure</span>
                                </div>
                                <div className="flex justify-between">
                                  <span className="text-slate-400">Severity:</span>
                                  <span className="font-medium text-slate-700">Minor → Investigate</span>
                                </div>
                                <div className="flex justify-between">
                                  <span className="text-slate-400">Source:</span>
                                  <span className="font-medium text-slate-700">Stage {stage.id}</span>
                                </div>
                                <div className="flex justify-between">
                                  <span className="text-slate-400">Status:</span>
                                  <span className="font-medium text-amber-600">Pending Investigation</span>
                                </div>
                                <div className="flex justify-between">
                                  <span className="text-slate-400">Assignee:</span>
                                  <span className="font-medium text-slate-700">QA Manager</span>
                                </div>
                                <div className="flex justify-between">
                                  <span className="text-slate-400">SLA:</span>
                                  <span className="font-medium text-slate-700">24 ชม.</span>
                                </div>
                              </div>
                              <div className="mt-2 pt-2 border-t border-orange-200/70 text-[11px] text-orange-800">
                                Batch จะถูก <strong>HOLD</strong> รอ QA ตัดสินใจ — Accept with justification, Rework, หรือ Reject
                              </div>
                            </div>
                          )}
                        </div>
                      </div>

                      {idx < form.stages.length - 1 && (
                        <div className="flex justify-center">
                          <div className="flex items-center gap-2 text-xs text-slate-400">
                            <Icon name="arrowDown" className="w-3 h-3" />
                            <span>ถ้า Stage {stage.id} ไม่ผ่าน</span>
                            <Icon name="arrowDown" className="w-3 h-3" />
                          </div>
                        </div>
                      )}
                    </React.Fragment>
                  ))}

                  {form.stages.length < 3 && (
                    <button
                      type="button"
                      onClick={addStage}
                      className="w-full py-3 rounded-xl border-2 border-dashed border-slate-300 text-slate-500 text-sm font-medium hover:border-emerald-400 hover:text-emerald-600 hover:bg-emerald-50/30 transition-all flex items-center justify-center gap-2">
                      <Icon name="plus" className="w-4 h-4" />
                      เพิ่ม Stage {form.stages.length + 1} (Retest)
                    </button>
                  )}
                </div>

                {/* Summary */}
                <div className="mt-4 pt-4 border-t border-slate-100 grid grid-cols-3 gap-4 text-center">
                  <div>
                    <div className="text-[11px] text-slate-500 uppercase tracking-wide">Total Stages</div>
                    <div className="text-lg font-bold text-emerald-700">{form.stages.length}</div>
                  </div>
                  <div>
                    <div className="text-[11px] text-slate-500 uppercase tracking-wide">Max Samples</div>
                    <div className="text-lg font-bold text-emerald-700">{cumulative[cumulative.length - 1] || 0}</div>
                  </div>
                  <div>
                    <div className="text-[11px] text-slate-500 uppercase tracking-wide">First Test</div>
                    <div className="text-lg font-bold text-emerald-700">{form.stages[0]?.sampleSize || 0} units</div>
                  </div>
                </div>
              </div>

              {/* Section 4 — Settings */}
              <div className="col-span-2 flex items-center gap-3 mt-3">
                <span className="w-7 h-7 rounded-lg bg-emerald-600 text-white flex items-center justify-center text-xs font-bold">4</span>
                <h3 className="font-semibold text-slate-900 text-sm">การตั้งค่า <span className="text-slate-400 font-normal">— Settings</span></h3>
                <div className="flex-1 h-px bg-slate-100"></div>
              </div>

              <div className="sm:col-span-2 grid grid-cols-1 sm:grid-cols-2 gap-3 sm:gap-4">
                <label className={`flex items-center gap-3 p-4 rounded-xl border cursor-pointer transition-all ${form.critical ? 'bg-red-50 border-red-200' : 'bg-white border-slate-200 hover:bg-slate-50'}`}>
                  <Toggle value={form.critical} onChange={v => set('critical', v)} label="" />
                  <div>
                    <div className="text-sm font-semibold text-slate-900 flex items-center gap-1.5">
                      Critical Test
                      {autoFilled.has('critical') && <AutoBadge />}
                    </div>
                    <div className="text-[11px] text-slate-500">ถ้า fail จะ block batch ทันที</div>
                  </div>
                </label>
                <label className={`flex items-center gap-3 p-4 rounded-xl border cursor-pointer transition-all ${form.active ? 'bg-emerald-50 border-emerald-200' : 'bg-white border-slate-200 hover:bg-slate-50'}`}>
                  <Toggle value={form.active} onChange={v => set('active', v)} label="" />
                  <div>
                    <div className="text-sm font-semibold text-slate-900">Active</div>
                    <div className="text-[11px] text-slate-500">เปิดใช้กับ batch ใหม่</div>
                  </div>
                </label>
              </div>
            </div>
          </div>
            </div>

            {/* Live Preview Panel */}
            <aside className="xl:col-span-1">
              <div className="xl:sticky xl:top-24 space-y-4">
                <div className="panel p-5">
                  <div className="flex items-center gap-2 mb-4 pb-3 border-b border-slate-100">
                    <span className="w-9 h-9 rounded-lg bg-gradient-to-br from-emerald-500 to-emerald-600 text-white flex items-center justify-center shadow-sm">
                      <svg className="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                        <rect x="2.5" y="4" width="19" height="13" rx="2" strokeWidth="1.8" />
                        <path d="M9 21h6M12 17v4" strokeWidth="1.8" strokeLinecap="round" />
                        <path d="M6 8h7M6 11h5" strokeWidth="1.8" strokeLinecap="round" />
                        <circle cx="17" cy="9" r="1.2" fill="currentColor" />
                      </svg>
                    </span>
                    <div className="flex-1">
                      <h3 className="font-semibold text-slate-900 text-sm flex items-center gap-1.5">
                        Live Preview
                        <span className="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse"></span>
                      </h3>
                      <p className="text-[11px] text-slate-500">ตัวอย่างที่ operator จะเห็น</p>
                    </div>
                  </div>

                  {/* Preview card */}
                  <div className="rounded-xl border border-slate-200 bg-gradient-to-br from-white to-slate-50 p-4 mb-4">
                    <div className="flex items-start justify-between mb-2">
                      <div className="flex flex-wrap gap-1.5">
                        {form.code && <span className="text-[10px] font-mono font-bold bg-emerald-100 text-emerald-700 px-2 py-0.5 rounded">{form.code}</span>}
                        {form.critical && <span className="text-[10px] font-bold bg-red-100 text-red-700 px-2 py-0.5 rounded">⚠ CRITICAL</span>}
                        {!form.active && <span className="text-[10px] bg-slate-100 text-slate-500 px-2 py-0.5 rounded">INACTIVE</span>}
                      </div>
                    </div>
                    <div className="text-sm font-semibold text-slate-900 mb-1">
                      {selectedTestLabel || <span className="text-slate-400 italic font-normal">— ยังไม่ได้เลือก Test —</span>}
                    </div>
                    {form.dosageForm && (
                      <div className="text-[11px] text-slate-500 mb-3">
                        {dosageForms.find(d => d.value === form.dosageForm)?.label}
                      </div>
                    )}

                    {form.criteriaType === 'numeric' && hasCalc && (
                      <div className="bg-emerald-50 rounded-lg p-2.5 text-center">
                        <div className="text-[10px] text-emerald-600 uppercase tracking-wide">Spec Range</div>
                        <div className="font-mono font-bold text-emerald-800 text-sm mt-1">
                          {calcMin} ≤ value ≤ {calcMax}
                        </div>
                        <div className="text-[10px] text-emerald-600 mt-0.5">
                          {form.target} ± {form.tolerance}% {form.unit && `(${units.find(u => u.value === form.unit)?.label.split(' —')[0] || form.unit})`}
                        </div>
                      </div>
                    )}
                    {form.criteriaType === 'pass_fail' && (
                      <div className="grid grid-cols-2 gap-1.5 mt-2">
                        <div className="bg-emerald-50 rounded-lg p-2 text-[11px]">
                          <div className="font-semibold text-emerald-700 mb-0.5">✓ PASS</div>
                          <div className="text-emerald-900/80 line-clamp-2">{form.passDefinition || <span className="italic text-emerald-600/50">—</span>}</div>
                        </div>
                        <div className="bg-red-50 rounded-lg p-2 text-[11px]">
                          <div className="font-semibold text-red-700 mb-0.5">✕ FAIL</div>
                          <div className="text-red-900/80 line-clamp-2">{form.failDefinition || <span className="italic text-red-600/50">—</span>}</div>
                        </div>
                      </div>
                    )}
                    {form.criteriaType === 'visual' && (
                      <div className="bg-amber-50 rounded-lg p-2.5 text-[11px]">
                        <div className="font-semibold text-amber-700 mb-1">👁 ตรวจด้วยสายตา</div>
                        <div className="text-amber-900/80 line-clamp-2">{form.visualCriteria || <span className="italic">—</span>}</div>
                        {form.visualChecklist.length > 0 && (
                          <div className="mt-1.5 text-[10px] text-amber-700">{form.visualChecklist.filter(Boolean).length} จุดตรวจ</div>
                        )}
                      </div>
                    )}
                    {form.criteriaType === 'text' && (
                      <div className="bg-slate-100 rounded-lg p-2.5 text-[11px]">
                        <div className="text-slate-500 mb-0.5">Format:</div>
                        <div className="font-mono text-slate-700">{form.textFormat || <span className="italic text-slate-400">—</span>}</div>
                      </div>
                    )}
                    {form.criteriaType === 'custom' && (
                      <div className="bg-violet-50 rounded-lg p-2.5 text-[11px]">
                        <div className="font-semibold text-violet-700 mb-1.5">⚙️ {form.customFields.length} ฟิลด์</div>
                        <div className="space-y-0.5 max-h-32 overflow-y-auto scrollbar">
                          {form.customFields.slice(0, 8).map((f, i) => (
                            <div key={f.id} className="flex items-center gap-1.5 text-violet-900/80 truncate">
                              <span className="w-4 text-violet-500 text-[9px]">{i + 1}.</span>
                              <span className="truncate flex-1">{f.label || <span className="italic text-violet-400">(ไม่มีชื่อ)</span>}</span>
                              <span className="text-[9px] bg-white px-1 rounded text-violet-600">{f.type === 'number' ? '🔢' : f.type === 'text' ? '📝' : f.type === 'pass_fail' ? '✓' : '👁'}</span>
                            </div>
                          ))}
                          {form.customFields.length > 8 && (
                            <div className="text-[10px] text-violet-500 italic">+ อีก {form.customFields.length - 8} ฟิลด์</div>
                          )}
                        </div>
                      </div>
                    )}
                  </div>

                  {/* Stage flow */}
                  <div>
                    <div className="text-[11px] font-semibold text-slate-500 uppercase tracking-wide mb-2">Acceptance Flow</div>
                    <div className="space-y-1.5">
                      {form.stages.map((s, i) => {
                        const n = parseInt(s.sampleSize) || 0;
                        const tol = parseFloat(s.failureTolerance) || 0;
                        const allowed = Math.floor(n * tol / 100);
                        return (
                          <React.Fragment key={s.id}>
                            <div className="flex items-center gap-2 text-xs">
                              <span className={`w-6 h-6 rounded-md flex items-center justify-center font-bold text-[10px] flex-shrink-0 ${i === 0 ? 'bg-emerald-600 text-white' : 'bg-amber-500 text-white'}`}>S{s.id}</span>
                              <div className="flex-1 min-w-0 bg-white border border-slate-200 rounded-lg px-2 py-1.5">
                                <div className="font-medium text-slate-700 truncate">สุ่ม {n} ชิ้น · เสียได้ {allowed}</div>
                                <div className="text-[10px] text-slate-400">tolerance {tol}%</div>
                              </div>
                            </div>
                            {i < form.stages.length - 1 && (
                              <div className="ml-3 text-[10px] text-slate-400 pl-2 border-l-2 border-dashed border-slate-200">
                                ↓ ถ้าไม่ผ่าน
                              </div>
                            )}
                          </React.Fragment>
                        );
                      })}
                      <div className="flex items-center gap-2 text-xs mt-1">
                        <span className={`w-6 h-6 rounded-md flex items-center justify-center font-bold text-[10px] flex-shrink-0 ${
                          form.stages[form.stages.length - 1]?.onFail === 'reject' ? 'bg-red-500 text-white' :
                          form.stages[form.stages.length - 1]?.onFail === 'deviation' ? 'bg-orange-500 text-white' : 'bg-slate-300 text-white'
                        }`}>!</span>
                        <div className="text-[11px] font-semibold">
                          {form.stages[form.stages.length - 1]?.onFail === 'reject' && <span className="text-red-600">✕ Reject Batch</span>}
                          {form.stages[form.stages.length - 1]?.onFail === 'deviation' && <span className="text-orange-600">⚠ บันทึก Deviation</span>}
                          {form.stages[form.stages.length - 1]?.onFail === 'next' && <span className="text-slate-500">→ ทดสอบต่อ</span>}
                        </div>
                      </div>
                    </div>
                  </div>
                </div>

                {/* GMP Compliance Check */}
                <div className="panel p-4">
                  <div className="flex items-center justify-between mb-3">
                    <div className="text-[11px] font-semibold text-slate-500 uppercase tracking-wide flex items-center gap-1">
                      <span>📜</span> GMP Compliance
                    </div>
                    {(() => {
                      const checks = [
                        { ok: !!form.testName,        label: 'Test name (USP / Pharmacopoeia)' },
                        { ok: !!form.code,            label: 'Unique Code (traceability)' },
                        { ok: form.stages.length > 0, label: `Multi-stage testing (USP <711>/<905>)` },
                        { ok: form.stages.some(s => s.onFail === 'deviation' || s.onFail === 'reject'), label: 'Fail-action defined (ICH Q9)' },
                        { ok: triggerSummary.length > 0, label: 'Sampling trigger (PIC/S Annex 8)' },
                        { ok: form.criteriaType !== 'numeric' || !!form.target, label: 'Acceptance criteria specified' },
                        { ok: form.active,            label: 'Active for batch production' },
                      ];
                      const passed = checks.filter(c => c.ok).length;
                      const pct = Math.round((passed / checks.length) * 100);
                      const color = pct >= 80 ? 'emerald' : pct >= 50 ? 'amber' : 'red';
                      const colorMap = {
                        emerald: 'bg-emerald-100 text-emerald-700 border-emerald-300',
                        amber: 'bg-amber-100 text-amber-700 border-amber-300',
                        red: 'bg-red-100 text-red-700 border-red-300',
                      };
                      return (
                        <span className={`text-[10px] font-bold px-2 py-0.5 rounded-full border ${colorMap[color]}`}>
                          {passed}/{checks.length} · {pct}%
                        </span>
                      );
                    })()}
                  </div>
                  <div className="space-y-1.5 text-xs">
                    {[
                      { ok: !!form.testName,        label: 'Test name (USP / Pharmacopoeia)' },
                      { ok: !!form.code,            label: 'Unique Code (traceability)' },
                      { ok: form.stages.length > 0, label: 'Multi-stage testing (USP <711>/<905>)' },
                      { ok: form.stages.some(s => s.onFail === 'deviation' || s.onFail === 'reject'), label: 'Fail-action defined (ICH Q9)' },
                      { ok: triggerSummary.length > 0, label: 'Sampling trigger (PIC/S Annex 8)' },
                      { ok: form.criteriaType !== 'numeric' || !!form.target, label: 'Acceptance criteria specified' },
                      { ok: form.active,            label: 'Active for batch production' },
                    ].map((c, i) => (
                      <div key={i} className="flex items-start gap-2">
                        <span className={`flex-shrink-0 w-4 h-4 rounded-full flex items-center justify-center text-[9px] font-bold ${c.ok ? 'bg-emerald-500 text-white' : 'bg-slate-200 text-slate-400'}`}>
                          {c.ok ? '✓' : '·'}
                        </span>
                        <span className={c.ok ? 'text-slate-700' : 'text-slate-400'}>{c.label}</span>
                      </div>
                    ))}
                  </div>
                </div>

                {/* Quick stats */}
                <div className="panel p-4">
                  <div className="text-[11px] font-semibold text-slate-500 uppercase tracking-wide mb-3">Summary</div>
                  <div className="space-y-2 text-xs">
                    <div className="flex justify-between"><span className="text-slate-500">Stages:</span><span className="font-bold text-slate-700">{form.stages.length}</span></div>
                    <div className="flex justify-between"><span className="text-slate-500">Max samples:</span><span className="font-bold text-slate-700">{form.stages.reduce((s, st) => s + (parseInt(st.sampleSize) || 0), 0)}</span></div>
                    <div>
                      <span className="text-slate-500 block mb-1">Inspection Triggers:</span>
                      <div className="flex flex-wrap gap-1">
                        {triggerSummary.length > 0 ? triggerSummary.map((s, i) => (
                          <span key={i} className="text-[10px] font-medium bg-emerald-50 text-emerald-700 border border-emerald-200 px-1.5 py-0.5 rounded">{s}</span>
                        )) : <span className="text-amber-600 text-[11px]">⚠ ยังไม่ได้ตั้ง</span>}
                      </div>
                    </div>
                    <div className="flex justify-between"><span className="text-slate-500">Sampling:</span><span className="font-medium text-slate-700 truncate ml-2">{samplingMethods.find(m => m.value === form.samplingMethod)?.label.split(' —')[0] || '—'}</span></div>
                  </div>
                </div>
              </div>
            </aside>
          </div>

          {/* Sticky footer actions */}
          <div className="sticky bottom-0 mt-6 -mx-4 sm:-mx-6 lg:-mx-8 px-4 sm:px-6 lg:px-8 py-3 sm:py-4 bg-white/90 backdrop-blur-sm border-t border-slate-200 flex flex-col sm:flex-row sm:items-center sm:justify-between gap-2 sm:gap-3 z-20">
            <div className="text-xs text-slate-500 truncate">
              {form.testName ? (
                <span className="flex items-center gap-2">
                  <span className="w-2 h-2 rounded-full bg-emerald-500 animate-pulse flex-shrink-0"></span>
                  <span className="truncate">พร้อมบันทึก: <span className="font-semibold text-slate-700">{form.code || '(ยังไม่มี Code)'}</span></span>
                </span>
              ) : (
                <span className="text-amber-600">⚠ กรุณาเลือก Test Name ก่อน</span>
              )}
            </div>
            <div className="flex gap-2 sm:gap-3 flex-shrink-0">
              <button className="btn btn-ghost flex-1 sm:flex-initial">CANCEL</button>
              <button className="btn btn-primary flex-1 sm:flex-initial" disabled={!form.testName || !form.code}>CREATE</button>
            </div>
          </div>
        </div>
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
